site_name: tg-cli
site_description: Agent-friendly Telegram CLI built on Telethon
site_url: https://b1rd33.github.io/tg-cli/
repo_url: https://github.com/b1rd33/tg-cli
repo_name: b1rd33/tg-cli
edit_uri: edit/main/docs/

copyright: MIT licensed. Built on Telethon.

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - Commands: commands.md
  - Python SDK: sdk.md
  - Safety model: safety.md
  - Multi-account: multi-account.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/b1rd33/tg-cli
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/tgctl/
